# Reusable: build and push to ghcr.io using the caller repository as context.
# Call with secrets: inherit; pass permissions contents:read + packages:write from the caller job.
# Optional pre_build: multiline shell; set pre_build_working_directory if paths are relative to a subfolder.

name: docker-ghcr

on:
  workflow_call:
    inputs:
      docker_context:
        description: Build context path (relative to repository root)
        type: string
        default: "."
      dockerfile:
        description: Dockerfile path (relative to repository root)
        type: string
        default: "Dockerfile"
      enable_latest_tag:
        description: Tag as latest on push to default branch (main)
        type: boolean
        default: true
      pre_build:
        description: Optional shell script; runs after checkout, before Docker build. Do not put secrets in this string—use inherited secrets (e.g. HOMEPAGE_CONTENT_PAT) via the Pre-build step env.
        type: string
        default: ""
      pre_build_working_directory:
        description: Working directory for the pre_build step (repository-relative)
        type: string
        default: "."

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Pre-build
        if: ${{ inputs.pre_build != '' }}
        working-directory: ${{ inputs.pre_build_working_directory }}
        env:
          # Caller: secrets: inherit — optional repo secrets available here (never pass secrets via pre_build input).
          HOMEPAGE_CONTENT_PAT: ${{ secrets.HOMEPAGE_CONTENT_PAT }}
          GH_TOKEN: ${{ github.token }}
        run: ${{ inputs.pre_build }}

      - uses: docker/setup-buildx-action@v3

      - name: Image name (GHCR requires lowercase)
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable=${{ inputs.enable_latest_tag && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
